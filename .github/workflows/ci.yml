name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Unit tests
        run: npm test

      - name: Validate physics HR
        run: npm run validate:physics-hr

      # Playwright（E2E: End-to-End）テストは一時的にCIで無効化
      # ⚠️ 再有効化する場合は、以下4ステップを復元してください:
      # - Install Playwright browsers
      # - E2E tests
      # - Upload Playwright report
      # - Upload Playwright traces
